name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install shasum shim
      if: runner.os == 'Windows'
      run: |
        mkdir -p "$RUNNER_TEMP/bin"
        {
          echo '#!/usr/bin/env bash'
          echo 'if [[ ${1:-} == -a && ${2:-} == 256 && ${3:-} == -c ]]; then'
          echo '  sha256sum -c'
          echo 'else'
          echo '  echo "Unsupported shasum arguments: $*" >&2'
          echo '  exit 2'
          echo 'fi'
        } > "$RUNNER_TEMP/bin/shasum"
        chmod +x "$RUNNER_TEMP/bin/shasum"
        echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
    - name: Run core tests
      run: make test
