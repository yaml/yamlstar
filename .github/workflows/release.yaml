name: Release YAMLStar

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.4)'
        required: true
        type: string
      bindings:
        description: 'Optional space-separated binding directories'
        required: false
        type: string
      bindings_skip:
        description: 'Optional space-separated binding directories to skip'
        required: false
        type: string
      publish_bindings_only:
        description: 'Publish bindings from existing release assets'
        default: false
        required: false
        type: boolean
      publish_homebrew_only:
        description: 'Publish Homebrew tap from existing release assets'
        default: false
        required: false
        type: boolean
      tests_only:
        description: >-
          Only test these platforms (space-separated subset of:
          linux macos windows); skips release and publish jobs
        default: ''
        required: false
        type: string
      test_artifacts_run_id:
        description: >-
          Prior release workflow run ID to take build artifacts from
          instead of building (use together with tests_only)
        required: false
        type: string
      force_bindings:
        description: 'Publish bindings even when the version already exists'
        default: false
        required: false
        type: boolean

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  VERSION: ${{ inputs.version }}
  JAVA_VERSION: '17'
  YS_RELEASE_CI: '1'
  YS_RELEASE_BINDINGS: ${{ inputs.bindings }}
  YS_RELEASE_BINDINGS_SKIP: ${{ inputs.bindings_skip }}
  YS_RELEASE_FORCE_BINDINGS: ${{ inputs.force_bindings && '1' || '' }}

jobs:
  verify-release:
    name: Verify release
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}
        fetch-depth: 0

    - name: Check tag and version
      run: |
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "ERROR: Invalid version: $VERSION"
          exit 1
        fi
        if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "ERROR: Tag $VERSION does not exist"
          exit 1
        fi
        if [[ $(git rev-parse "$VERSION^{commit}") != \
              $(git rev-parse HEAD) ]]; then
          echo "ERROR: Tag $VERSION does not point to checkout HEAD"
          exit 1
        fi
        if [[ $(sed -n 's/^version: //p' Meta) != "$VERSION" ]]; then
          echo "ERROR: Meta version does not match $VERSION"
          exit 1
        fi

    - name: Check release assets are not already published
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$VERSION" --json assets --jq '.assets | length' \
           2>/dev/null | grep -q '^[1-9]'; then
          echo "ERROR: Release $VERSION already has assets"
          exit 1
        fi

  build-linux-x64:
    name: Build Linux x64
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Build release archives and Python wheel
      run: |
        make release-lib VERSION="$VERSION"
        make release-cli VERSION="$VERSION"
        make -C python wheel VERSION="$VERSION"

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v6
      with:
        name: linux-x64
        path: |
          dist/yamlstar-${{ inputs.version }}-linux-x64.tar.xz
          dist/libyamlstar-${{ inputs.version }}-linux-x64.tar.xz
          python/dist/*.whl
        retention-days: 7

  build-macos-arm64:
    name: Build macOS ARM64
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: verify-release
    runs-on: macos-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Build release archives and Python wheel
      run: |
        make release-lib VERSION="$VERSION"
        make release-cli VERSION="$VERSION"
        make -C python wheel VERSION="$VERSION"

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v6
      with:
        name: macos-arm64
        path: |
          dist/yamlstar-${{ inputs.version }}-macos-arm64.tar.xz
          dist/libyamlstar-${{ inputs.version }}-macos-arm64.tar.xz
          python/dist/*.whl
        retention-days: 7

  build-windows-x64:
    name: Build Windows x64
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: verify-release
    runs-on: windows-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Install zip
      run: choco install zip -y

    - name: Install shasum shim
      run: |
        mkdir -p "$RUNNER_TEMP/bin"
        {
          echo '#!/usr/bin/env bash'
          echo 'if [[ ${1:-} == -a && ${2:-} == 256 && ${3:-} == -c ]]; then'
          echo '  sha256sum -c'
          echo 'else'
          echo '  echo "Unsupported shasum arguments: $*" >&2'
          echo '  exit 2'
          echo 'fi'
        } > "$RUNNER_TEMP/bin/shasum"
        chmod +x "$RUNNER_TEMP/bin/shasum"
        echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Build release archives and Python wheel
      run: |
        make release-lib VERSION="$VERSION"
        make release-cli VERSION="$VERSION"
        make -C python wheel VERSION="$VERSION"

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v6
      with:
        name: windows-x64
        path: |
          dist/yamlstar-${{ inputs.version }}-windows-x64.zip
          dist/libyamlstar-${{ inputs.version }}-windows-x64.zip
          python/dist/*.whl
        retention-days: 7

  test-linux:
    name: Test Linux artifacts
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: build-linux-x64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Download Linux artifacts
      uses: actions/download-artifact@v7
      with:
        name: linux-x64
        path: release-artifacts

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml) == '{"a":1}' ]]

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: make test-all TEST-TIME='date; time' BINDING-SKIP=php

  test-macos:
    name: Test macOS artifacts
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: build-macos-arm64
    runs-on: macos-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Download macOS artifacts
      uses: actions/download-artifact@v7
      with:
        name: macos-arm64
        path: release-artifacts

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml) == '{"a":1}' ]]

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: make test-all TEST-TIME='date; time' BINDING-SKIP="delphi haskell lua php r zig"

  test-windows:
    name: Test Windows artifacts
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: build-windows-x64
    runs-on: windows-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Download Windows artifacts
      uses: actions/download-artifact@v7
      with:
        name: windows-x64
        path: release-artifacts

    - name: Install shasum shim
      run: |
        mkdir -p "$RUNNER_TEMP/bin"
        {
          echo '#!/usr/bin/env bash'
          echo 'if [[ ${1:-} == -a && ${2:-} == 256 && ${3:-} == -c ]]; then'
          echo '  sha256sum -c'
          echo 'else'
          echo '  echo "Unsupported shasum arguments: $*" >&2'
          echo '  exit 2'
          echo 'fi'
        } > "$RUNNER_TEMP/bin/shasum"
        chmod +x "$RUNNER_TEMP/bin/shasum"
        echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

    - name: Configure archive tools
      run: |
        echo 'TAR_OPTIONS=--force-local' >> "$GITHUB_ENV"
        echo 'UNZIP=-o' >> "$GITHUB_ENV"

    - name: Configure Strawberry Perl toolchain
      run: |
        echo 'C:\Strawberry\perl\bin' >> "$GITHUB_PATH"
        echo 'C:\Strawberry\c\bin' >> "$GITHUB_PATH"

    - name: Install Crystal link dependencies
      uses: msys2/setup-msys2@v2
      with:
        release: false
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gc
          mingw-w64-x86_64-pcre2

    - name: Configure Crystal link dependencies
      run: |
        echo 'C:\msys64\mingw64\bin' >> "$GITHUB_PATH"
        echo 'CC=gcc' >> "$GITHUB_ENV"
        echo 'CRYSTAL_MINGW_LIB=/c/msys64/mingw64/lib' >> "$GITHUB_ENV"

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml.exe --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml.exe) == '{"a":1}' ]]

    - name: Smoke test Python wheel
      run: |
        wheel=$(find release-artifacts -type f -name '*.whl' | head -n1)
        test -n "$wheel"
        python -m pip install --force-reinstall "$wheel"
        python -c "import yamlstar; print(yamlstar.YAMLStar().load('a: 1'))"

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: |
        make -k test-all \
          TEST-TIME='date; time' \
          BINDING-SKIP="crystal delphi elixir haskell lua php r raku swift $YS_RELEASE_BINDINGS_SKIP"

  test-linux-retry:
    name: Test Linux artifacts (retry)
    if: >-
      ${{
        !inputs.publish_bindings_only &&
        !inputs.publish_homebrew_only &&
        contains(inputs.tests_only, 'linux') &&
        inputs.test_artifacts_run_id != ''
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
    - name: Checkout ref
      uses: actions/checkout@v5

    - name: Download Linux artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh run download "${{ inputs.test_artifacts_run_id }}" \
          --repo "${{ github.repository }}" \
          --name linux-x64 \
          --dir release-artifacts

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml) == '{"a":1}' ]]

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: make test-all TEST-TIME='date; time' BINDING-SKIP="php $YS_RELEASE_BINDINGS_SKIP"

  test-macos-retry:
    name: Test macOS artifacts (retry)
    if: >-
      ${{
        !inputs.publish_bindings_only &&
        !inputs.publish_homebrew_only &&
        contains(inputs.tests_only, 'macos') &&
        inputs.test_artifacts_run_id != ''
      }}
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
    steps:
    - name: Checkout ref
      uses: actions/checkout@v5

    - name: Download macOS artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh run download "${{ inputs.test_artifacts_run_id }}" \
          --repo "${{ github.repository }}" \
          --name macos-arm64 \
          --dir release-artifacts

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml) == '{"a":1}' ]]

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: |
        make test-all \
          TEST-TIME='date; time' \
          BINDING-SKIP="delphi haskell lua php r zig $YS_RELEASE_BINDINGS_SKIP"

  test-windows-retry:
    name: Test Windows artifacts (retry)
    if: >-
      ${{
        !inputs.publish_bindings_only &&
        !inputs.publish_homebrew_only &&
        contains(inputs.tests_only, 'windows') &&
        inputs.test_artifacts_run_id != ''
      }}
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
    steps:
    - name: Checkout ref
      uses: actions/checkout@v5

    - name: Download Windows artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh run download "${{ inputs.test_artifacts_run_id }}" \
          --repo "${{ github.repository }}" \
          --name windows-x64 \
          --dir release-artifacts

    - name: Install shasum shim
      run: |
        mkdir -p "$RUNNER_TEMP/bin"
        {
          echo '#!/usr/bin/env bash'
          echo 'if [[ ${1:-} == -a && ${2:-} == 256 && ${3:-} == -c ]]; then'
          echo '  sha256sum -c'
          echo 'else'
          echo '  echo "Unsupported shasum arguments: $*" >&2'
          echo '  exit 2'
          echo 'fi'
        } > "$RUNNER_TEMP/bin/shasum"
        chmod +x "$RUNNER_TEMP/bin/shasum"
        echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

    - name: Configure archive tools
      run: |
        echo 'TAR_OPTIONS=--force-local' >> "$GITHUB_ENV"
        echo 'UNZIP=-o' >> "$GITHUB_ENV"

    - name: Configure Strawberry Perl toolchain
      run: |
        echo 'C:\Strawberry\perl\bin' >> "$GITHUB_PATH"
        echo 'C:\Strawberry\c\bin' >> "$GITHUB_PATH"

    - name: Install Crystal link dependencies
      uses: msys2/setup-msys2@v2
      with:
        release: false
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gc
          mingw-w64-x86_64-pcre2

    - name: Configure Crystal link dependencies
      run: |
        echo 'C:\msys64\mingw64\bin' >> "$GITHUB_PATH"
        echo 'CC=gcc' >> "$GITHUB_ENV"
        echo 'CRYSTAL_MINGW_LIB=/c/msys64/mingw64/lib' >> "$GITHUB_ENV"

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Smoke test CLI
      run: |
        cli/bin/yaml.exe --version
        [[ $(printf 'a: 1\n' | cli/bin/yaml.exe) == '{"a":1}' ]]

    - name: Smoke test Python wheel
      run: |
        wheel=$(find release-artifacts -type f -name '*.whl' | head -n1)
        test -n "$wheel"
        python -m pip install --force-reinstall "$wheel"
        python -c "import yamlstar; print(yamlstar.YAMLStar().load('a: 1'))"

    - name: Use GitHub Leiningen mirror
      run: |
        make --no-print-directory -n default >/dev/null
        python - <<'PY'
        from pathlib import Path
        p = Path('.cache/makes/lein.mk')
        text = p.read_text()
        text = text.replace(
          'https://codeberg.org/leiningen/leiningen/raw/tag',
          'https://raw.githubusercontent.com/technomancy/leiningen')
        text = text.replace(
          '\t$Q curl+ $(LEIN-DOWN) > $@\n',
          '\t$Q curl+ $(LEIN-DOWN) > $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_VERSION=.*|export LEIN_VERSION="$(LEIN-VERSION)"|\' $@\n'
          '\t$Q sed -i.bak \'s|export LEIN_CHECKSUM=.*|export LEIN_CHECKSUM="5f5231f06c3c7924e3241e3dfa52885577fb44ddf8a9ea373d2c5e2f27217565"|\' $@\n')
        p.write_text(text)
        PY

    - name: Run tests
      run: |
        make -k test-all \
          TEST-TIME='date; time' \
          BINDING-SKIP="crystal delphi elixir haskell lua php r raku swift $YS_RELEASE_BINDINGS_SKIP"

  create-release:
    name: Create GitHub release
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs:
    - test-linux
    - test-macos
    - test-windows
    - build-linux-x64
    - build-macos-arm64
    - build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Build release notes
      run: |
        {
          echo "YAMLStar $VERSION"
          echo
          if [[ -f Changes ]]; then
            awk -v ver="$VERSION" '
              /^- version: / && $3 == ver { found = 1; next }
              /^- version: / && found { exit }
              found && $1 != "date:" && $1 != "changes:" { print }
            ' Changes | sed 's/^  - /* /'
          fi
        } > release-notes.txt
        cat release-notes.txt

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "$VERSION" \
          --title "YAMLStar $VERSION" \
          --notes-file release-notes.txt \
          --draft=false \
          --prerelease=false

  upload-assets:
    name: Upload release assets
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}

    - name: Download release artifacts
      uses: actions/download-artifact@v7

    - name: Prepare release assets
      run: |
        find . -type f -name '*.tar.xz' -exec mv {} . \;
        find . -type f -name '*.zip' -exec mv {} . \;
        find . -type f -name '*.whl' -exec mv {} . \;
        ls -lh yamlstar-* libyamlstar-* *.whl

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$VERSION" \
          yamlstar-*.tar.xz yamlstar-*.zip libyamlstar-* *.whl --clobber
        gh release view "$VERSION"

  publish-homebrew:
    name: Publish Homebrew tap
    if: |
      ${{
        always() &&
        !cancelled() &&
        !inputs.tests_only &&
        (
          inputs.publish_homebrew_only ||
          needs.upload-assets.result == 'success'
        )
      }}
    needs: upload-assets
    runs-on: ubuntu-latest
    env:
      YAMLSTAR_HOMEBREW_TAP_SSH_KEY: ${{ secrets.YAMLSTAR_HOMEBREW_TAP_SSH_KEY }}
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: >-
          ${{
            inputs.publish_homebrew_only &&
            github.ref ||
            inputs.version
          }}

    - name: Configure tap SSH key
      if: ${{ env.YAMLSTAR_HOMEBREW_TAP_SSH_KEY != '' }}
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ env.YAMLSTAR_HOMEBREW_TAP_SSH_KEY }}

    - name: Configure Git identity
      run: |
        git config --global user.name 'YAMLStar Release Bot'
        git config --global user.email 'yamlstar-release@yaml.com'

    - name: Publish Homebrew tap
      run: |
        if [[ -z "${YAMLSTAR_HOMEBREW_TAP_SSH_KEY:-}" ]]; then
          echo "ERROR: YAMLSTAR_HOMEBREW_TAP_SSH_KEY secret is not set"
          exit 1
        fi
        make release-homebrew n="$VERSION"

  publish-bindings:
    name: Publish language bindings
    if: |
      ${{
        always() &&
        !cancelled() &&
        !inputs.tests_only &&
        !inputs.publish_homebrew_only &&
        (
          inputs.publish_bindings_only ||
          needs.upload-assets.result == 'success'
        )
      }}
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      YS_RELEASE_VERSION_NEW: ${{ inputs.version }}
      GH_TOKEN: ${{ secrets.YAMLSTAR_RELEASE_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.YAMLSTAR_RELEASE_TOKEN || github.token }}
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
      CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
      HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
      PAUSE_USER: ${{ secrets.PAUSE_USER }}
      PAUSE_PASS: ${{ secrets.PAUSE_PASS }}
      FEZ_USER: ${{ secrets.FEZ_USER }}
      FEZ_TOKEN: ${{ secrets.FEZ_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
      PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
      PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
      YAMLSTAR_BINDING_REPO_SSH_KEY: ${{ secrets.YAMLSTAR_BINDING_REPO_SSH_KEY }}
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: >-
          ${{
            inputs.publish_bindings_only &&
            github.ref ||
            inputs.version
          }}
        fetch-depth: 0

    - name: Download Linux release assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p release-artifacts
        gh release download "$VERSION" \
          --repo "${{ github.repository }}" \
          --pattern '*.tar.xz' \
          --dir release-artifacts
        mkdir -p python/dist
        gh release download "$VERSION" \
          --repo "${{ github.repository }}" \
          --pattern '*.whl' \
          --dir python/dist || true

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Configure mirror repo SSH key
      if: ${{ env.YAMLSTAR_BINDING_REPO_SSH_KEY != '' }}
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ env.YAMLSTAR_BINDING_REPO_SSH_KEY }}

    - name: Configure npm credentials
      run: |
        if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
          echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' \
            > ~/.npmrc
        fi

    - name: Configure GPG signing key
      if: ${{ env.GPG_PRIVATE_KEY != '' }}
      run: |
        printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

    - name: Configure Git identity
      run: |
        git config --global user.name 'YAMLStar Release Bot'
        git config --global user.email 'yamlstar-release@yaml.com'

    - name: Publish bindings
      run: make release-bindings n="$VERSION"

  publish-website:
    name: Publish website
    if: ${{ !inputs.publish_bindings_only && !inputs.publish_homebrew_only && !inputs.tests_only }}
    needs:
    - publish-bindings
    - publish-homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.YAMLSTAR_RELEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.YAMLSTAR_RELEASE_TOKEN }}
    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.version }}
        fetch-depth: 0
        token: ${{ secrets.YAMLSTAR_RELEASE_TOKEN }}

    - name: Configure Git identity
      run: |
        git config --global user.name 'YAMLStar Release Bot'
        git config --global user.email 'yamlstar-release@yaml.com'

    - name: Publish website
      run: |
        REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/yaml/yamlstar" \
          make release-website
